openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: landmarks
    description: Landmark operations
  - name: safety
    description: Safety information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /landmarks:
    get:
      operationId: getLandmarks
      tags: [landmarks]
      summary: Get all landmarks
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of landmarks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Landmark"

  /landmarks/{id}:
    get:
      operationId: getLandmarkById
      tags: [landmarks]
      summary: Get landmark by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Landmark details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Landmark"
        "404":
          description: Not found

  /tourist-rights:
    get:
      operationId: getTouristRights
      tags: [safety]
      summary: Get tourist rights
      responses:
        "200":
          description: List of tourist rights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TouristRight"

  /emergency-contacts:
    get:
      operationId: getEmergencyContacts
      tags: [safety]
      summary: Get emergency contacts
      responses:
        "200":
          description: List of emergency contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyContact"

  /common-scams:
    get:
      operationId: getCommonScams
      tags: [safety]
      summary: Get common scams
      responses:
        "200":
          description: List of common scams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommonScam"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LandmarkLocation:
      type: object
      properties:
        city:
          type: string
        region:
          type: string
        latitude:
          type: number
        longitude:
          type: number
      required:
        - city

    Landmark:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameAr:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        rating:
          type: number
        location:
          $ref: "#/components/schemas/LandmarkLocation"
        tags:
          type: array
          items:
            type: string
        openingHours:
          type: string
        ticketPrice:
          type: string
        historicalPeriod:
          type: string
        highlights:
          type: array
          items:
            type: string
        tips:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - description
        - category
        - rating
        - location

    TouristRight:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: string
      required:
        - id
        - title
        - description

    EmergencyContact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        number:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - number

    CommonScam:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        howToAvoid:
          type: string
      required:
        - id
        - title
        - description
        - severity
        - howToAvoid
