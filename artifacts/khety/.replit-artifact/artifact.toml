kind = "web"
previewPath = "/"
title = "Khety Guide"
version = "1.0.0"
id = "artifacts/khety"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25246

[services.development]
run = "pnpm --filter @workspace/khety run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khety", "run", "build" ]
publicDir = "artifacts/khety/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25246"
BASE_PATH = "/"
