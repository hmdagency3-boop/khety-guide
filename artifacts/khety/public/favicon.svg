<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="180" height="180" rx="36" fill="#1a1209"/>
  <!-- Gold gradient overlay -->
  <rect width="180" height="180" rx="36" fill="url(#gold_grad)" opacity="0.18"/>

  <!-- Outer decorative ring -->
  <circle cx="90" cy="90" r="72" stroke="#D4AF37" stroke-width="2.5" opacity="0.35"/>

  <!-- Inner circle -->
  <circle cx="90" cy="90" r="58" fill="#D4AF37" fill-opacity="0.08"/>

  <!-- Eye of Horus / Khety stylised hieroglyph -->
  <!-- Main eye oval -->
  <ellipse cx="90" cy="82" rx="30" ry="20" fill="none" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pupil -->
  <circle cx="90" cy="82" r="9" fill="#D4AF37"/>
  <!-- Pupil inner dark -->
  <circle cx="90" cy="82" r="5" fill="#1a1209"/>
  <!-- Gold dot highlight -->
  <circle cx="94" cy="79" r="2.2" fill="#D4AF37" opacity="0.9"/>

  <!-- Kohl line extending left -->
  <path d="M60 82 Q52 90 56 98" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Kohl line extending right -->
  <path d="M120 82 L130 78" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Bottom lotus/base decoration -->
  <path d="M72 112 Q90 104 108 112" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M80 112 Q90 108 100 112" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Small star dots -->
  <circle cx="55" cy="55" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="125" cy="55" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="55" cy="125" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="125" cy="125" r="2" fill="#D4AF37" opacity="0.5"/>

  <defs>
    <linearGradient id="gold_grad" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
</svg>
